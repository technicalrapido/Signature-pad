<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Signature Pad</title>
<style>
  :root {
    --bg: #f5f5f3;
    --card-bg: #ffffff;
    --border: #dddbd2;
    --border-strong: #c4c2b8;
    --text-primary: #1a1a1a;
    --text-secondary: #6b6a63;
    --accent-bg: #e6f1fb;
    --accent-border: #85b7eb;
    --accent-text: #0c447c;
    --danger: #a32d2d;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --card-bg: #262624;
      --border: #3a3a37;
      --border-strong: #4a4a46;
      --text-primary: #f0efe9;
      --text-secondary: #b4b2a9;
      --accent-bg: #0c447c;
      --accent-border: #378ADD;
      --accent-text: #b5d4f4;
      --danger: #f09595;
    }
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 24px 16px 48px;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text-primary);
    display: flex;
    justify-content: center;
  }

  .wrap {
    width: 100%;
    max-width: 480px;
  }

  .brand-header {
    background: linear-gradient(135deg, #dce8fa 0%, #eef3fc 60%, #e3edfb 100%);
    border-radius: var(--radius-lg);
    padding: 20px 16px;
    text-align: center;
    margin-bottom: 20px;
  }

  .logo-wrap {
    width: 60%;
    max-width: 220px;
    margin: 0 auto 14px;
    border-radius: 16px;
    overflow: hidden;
    background: #ffffff;
    box-shadow: 0 1px 3px rgba(11, 30, 61, 0.15);
  }

  .brand-header img {
    width: 100%;
    height: auto;
    display: block;
  }

  .brand-header h2 {
    font-size: 19px;
    font-weight: 700;
    color: #0b1e3d;
    margin: 0 0 10px;
  }

  .brand-header .contact-line {
    font-size: 12.5px;
    color: #2a4a7c;
    margin: 0 0 4px;
  }

  .brand-header .contact-line a {
    color: #1d5fc2;
    text-decoration: none;
  }

  @media (prefers-color-scheme: dark) {
    .brand-header {
      background: linear-gradient(135deg, #1d2a44 0%, #18213a 60%, #1a2640 100%);
    }
    .brand-header h2 { color: #eef3fc; }
    .brand-header .contact-line { color: #a9c2e8; }
    .brand-header .contact-line a { color: #7fb0f5; }
  }

  h1 {
    font-size: 18px;
    font-weight: 600;
    margin: 0 0 4px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-secondary);
    margin: 0 0 20px;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }

  .field {
    margin-bottom: 14px;
  }

  input[type="text"],
  input[type="date"] {
    width: 100%;
    height: 40px;
    padding: 0 12px;
    font-size: 15px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-md);
    background: var(--card-bg);
    color: var(--text-primary);
    font-family: inherit;
  }

  input[type="text"]:focus,
  input[type="date"]:focus {
    outline: none;
    border-color: var(--accent-border);
    box-shadow: 0 0 0 3px rgba(133, 183, 235, 0.25);
  }

  .canvas-wrap {
    background: var(--bg);
    border-radius: var(--radius-md);
    padding: 8px;
    margin: 4px 0 8px;
  }

  canvas {
    width: 100%;
    aspect-ratio: 4 / 1;
    display: block;
    touch-action: none;
    background: var(--card-bg);
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
  }

  .hint {
    font-size: 13px;
    color: var(--text-secondary);
    text-align: center;
    margin: 0 0 16px;
    min-height: 18px;
  }

  .hint.error { color: var(--danger); }

  .btn-row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }

  button {
    height: 40px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-strong);
    background: var(--card-bg);
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background 0.15s ease;
  }

  button:hover { background: var(--bg); }
  button:active { transform: scale(0.98); }

  button.primary {
    background: var(--accent-bg);
    border-color: var(--accent-border);
    color: var(--accent-text);
    width: 100%;
    margin-bottom: 12px;
  }

  .icon {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  .footer-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-secondary);
    padding: 0 2px;
  }
</style>
</head>

    </div>
    <h2>Service Record Sheet</h2>
    <p class="contact-line">Phone: 800-7378 &nbsp;|&nbsp; Email: <a href="mailto:admin@rapido.com.qa">admin@rapido.com.qa</a></p>
    <p class="contact-line">Website: <a href="https://www.rapido.com.qa">www.rapido.com.qa</a> &nbsp;|&nbsp; P.O.Box 9280, Doha, Qatar</p>
  </div>

  <div class="card">
    <div class="field">
      <label for="clientName">Client Representative</label>
      <input id="clientName" type="text" placeholder="Enter name" />
    </div>
    <div class="field">
      <label for="signDate">Date</label>
      <input id="signDate" type="date" />
    </div>

    <div class="canvas-wrap">
      <canvas id="sigCanvas"></canvas>
    </div>
    <p id="hint" class="hint">Sign above with your finger or mouse</p>

    <div class="btn-row">
      <button id="clearBtn" type="button">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
        Clear
      </button>
    </div>

    <button id="downloadBtn" class="primary" type="button">
      Submit
    </button>

    <div class="footer-row" style="display:none;">
      <span id="sizeOut">File size: —</span>
      <span>Transparent background</span>
    </div>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('sigCanvas');
  const ctx = canvas.getContext('2d');
  const hint = document.getElementById('hint');
  const sizeOut = document.getElementById('sizeOut');
  const clientNameInput = document.getElementById('clientName');
  const signDateInput = document.getElementById('signDate');

  const today = new Date();
  signDateInput.value = today.toISOString().slice(0, 10);

  let strokes = [];
  let currentStroke = null;
  let drawing = false;
  let dpr = Math.max(window.devicePixelRatio || 1, 1);

  function resize() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    redraw();
  }

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    let clientX, clientY;
    if (e.touches && e.touches.length) {
      clientX = e.touches[0].clientX;
      clientY = e.touches[0].clientY;
    } else {
      clientX = e.clientX;
      clientY = e.clientY;
    }
    return {
      x: (clientX - rect.left) * dpr,
      y: (clientY - rect.top) * dpr
    };
  }

  function startDraw(e) {
    e.preventDefault();
    drawing = true;
    currentStroke = [getPos(e)];
    strokes.push(currentStroke);
    hint.style.opacity = '0';
  }

  function moveDraw(e) {
    if (!drawing) return;
    e.preventDefault();
    const pos = getPos(e);
    currentStroke.push(pos);
    redraw();
  }

  function endDraw() {
    if (!drawing) return;
    drawing = false;
    currentStroke = null;
    updateFileSizeEstimate();
  }

  function redraw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 2 * dpr;
    for (const stroke of strokes) {
      if (stroke.length < 2) {
        if (stroke.length === 1) {
          ctx.beginPath();
          ctx.arc(stroke[0].x, stroke[0].y, ctx.lineWidth / 2, 0, Math.PI * 2);
          ctx.fillStyle = '#1a1a1a';
          ctx.fill();
        }
        continue;
      }
      ctx.beginPath();
      ctx.moveTo(stroke[0].x, stroke[0].y);
      for (let i = 1; i < stroke.length; i++) {
        ctx.lineTo(stroke[i].x, stroke[i].y);
      }
      ctx.stroke();
    }
  }

  function updateFileSizeEstimate() {
    canvas.toBlob(function(blob) {
      if (!blob) return;
      const kb = blob.size / 1024;
      sizeOut.textContent = 'File size: ~' + (kb < 10 ? kb.toFixed(1) : Math.round(kb)) + ' KB';
    }, 'image/png');
  }

  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', moveDraw);
  window.addEventListener('mouseup', endDraw);

  canvas.addEventListener('touchstart', startDraw, { passive: false });
  canvas.addEventListener('touchmove', moveDraw, { passive: false });
  canvas.addEventListener('touchend', endDraw, { passive: false });
  canvas.addEventListener('touchcancel', endDraw, { passive: false });

  document.getElementById('clearBtn').addEventListener('click', function() {
    strokes = [];
    redraw();
    hint.style.opacity = '1';
    hint.classList.remove('error');
    hint.textContent = 'Sign above with your finger or mouse';
    sizeOut.textContent = 'File size: —';
  });

  function formatDateLabel(dateStr) {
    if (!dateStr) return '';
    const parts = dateStr.split('-');
    if (parts.length !== 3) return dateStr;
    const d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
  }

  document.getElementById('downloadBtn').addEventListener('click', function() {
    if (strokes.length === 0) {
      hint.textContent = 'Please sign before downloading';
      hint.style.opacity = '1';
      hint.classList.add('error');
      return;
    }

    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const stroke of strokes) {
      for (const p of stroke) {
        if (p.x < minX) minX = p.x;
        if (p.y < minY) minY = p.y;
        if (p.x > maxX) maxX = p.x;
        if (p.y > maxY) maxY = p.y;
      }
    }
    const pad = 10 * dpr;
    minX = Math.max(0, minX - pad);
    minY = Math.max(0, minY - pad);
    maxX = Math.min(canvas.width, maxX + pad);
    maxY = Math.min(canvas.height, maxY + pad);
    const w = Math.max(1, maxX - minX);
    const h = Math.max(1, maxY - minY);

    const targetW = Math.min(600, w);
    const scale = targetW / w;
    const sigW = targetW;
    const sigH = h * scale;

    const name = clientNameInput.value.trim();
    const dateLabel = formatDateLabel(signDateInput.value);
    const textBlockH = (name || dateLabel) ? 56 : 0;

    const outCanvas = document.createElement('canvas');
    outCanvas.width = sigW;
    outCanvas.height = sigH + textBlockH;
    const outCtx = outCanvas.getContext('2d');

    outCtx.drawImage(canvas, minX, minY, w, h, 0, 0, sigW, sigH);

    if (textBlockH > 0) {
      outCtx.strokeStyle = 'rgba(26,26,26,0.25)';
      outCtx.lineWidth = 1;
      outCtx.beginPath();
      outCtx.moveTo(0, sigH + 8);
      outCtx.lineTo(sigW, sigH + 8);
      outCtx.stroke();

      outCtx.fillStyle = '#1a1a1a';
      outCtx.textBaseline = 'top';
      outCtx.font = '500 15px sans-serif';
      if (name) outCtx.fillText(name, 0, sigH + 16);

      outCtx.fillStyle = 'rgba(26,26,26,0.65)';
      outCtx.font = '400 13px sans-serif';
      if (dateLabel) outCtx.fillText(dateLabel, 0, sigH + (name ? 36 : 16));
    }

    outCanvas.toBlob(function(blob) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const safeName = (clientNameInput.value.trim() || 'signature').replace(/[^a-z0-9]+/gi, '_').toLowerCase();
      a.download = safeName + '_signature.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
      const kb = blob.size / 1024;
      sizeOut.textContent = 'File size: ~' + (kb < 10 ? kb.toFixed(1) : Math.round(kb)) + ' KB';
    }, 'image/png');
  });

  window.addEventListener('resize', resize);
  resize();
})();
</script>
